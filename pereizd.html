<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>Переїзд</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">

<!-- PWA: скрывает адресную строку при запуске с экрана -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Розклад">

<!-- Окрашивает строку статуса/адресную строку — подстраивается под тему в theme-toggle.js -->
<meta id="themeColorMeta" name="theme-color" content="#f2f2f7">

<!-- Манифест и иконки (распакуй сюда содержимое icons/ из Icon Forge) -->
<link rel="manifest" href="/icons/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="icon" href="/icons/favicon.ico" sizes="32x32">
<meta name="msapplication-config" content="/browserconfig.xml">

<!-- Open Graph / превью при шаринге ссылки -->
<meta property="og:title" content="Розклад Переїзд">
<meta property="og:description" content="Розклад транспорту Переїзд">
<meta property="og:type" content="website">
<meta property="og:image" content="https://tereschky.vercel.app/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Розклад Переїзд">
<meta name="twitter:image" content="https://tereschky.vercel.app/og-image.png">
<link rel="stylesheet" href="schedule-live.css">
<style>
/* ---------- iOS LIGHT ---------- */
:root {
  --bg-0: #f2f2f7;             /* фон страницы */
  --bg-1: #ffffff;             /* шапка */
  --bg-2: #fafafa;             /* ячейки */
  --label: #000000;            /* основной текст */
  --label-2: #6c6c70;          /* вторичный */
  --label-3: #3a3a3c;
  --separator: #c6c6c8;        /* тонкие линии */
  --accent: #007aff;           /* синий акцент */
  --accent-text: #ffffff;
  --sat-red: #ff3b30;          /* выходные */
  --warn: #ff9500;             /* предупреждения */
  --font: -apple-system, Roboto, "Segoe UI", Helvetica, Arial, sans-serif;

  --w-ter-1: 20%;  /* Терешки будні */
  --w-ter-2: 20%;  /* Терешки нд    */
  --w-myk:   20%;  /* Мик.          */
  --w-min:   20%;  /* Мин.          */
  --w-kas:   20%;  /* Кашуб.        */
}

/* ---------- iOS DARK + Pure Black ---------- */
[data-theme="dark"] {
  --bg-0: #000000;             /* OLED чёрный */
  --bg-1: #1c1c1e;             /* шапка */
  --bg-2: #252528;             /* ячейки */
  --label: #ffffff;
  --label-2: #a2a2a7;
  --label-3: #e5e5ea;
  --separator: #6c6c70;
  --accent: #0a84ff;
  --accent-text: #ffffff;
  --sat-red: #ff5e57;
  --warn: #ff9f0a;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); transition: background-color .25s ease, color .25s ease; }
html { background: var(--bg-0); }
body { background: var(--bg-0); color: var(--label); font-size: 16px; font-weight: 600; padding: 10px 8px; max-width: 640px; margin: 0 auto; }
table { width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 0; margin: 10px 0; background: var(--bg-1); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.12); }

/* шапка */
th { background: var(--bg-1); color: var(--label); padding: 10px 2px; font-size: 17px; font-weight: 700; letter-spacing: .2px; border-bottom: 1px solid var(--separator); white-space: normal; line-height: 1.15; }
/* ячейки */
td { background: var(--bg-2); padding: 0 2px; font-size: 16px; color: var(--label-2); text-align: left; white-space: nowrap; font-weight: 600; border: 3px solid transparent; transition: border-color 1s ease, color 1s ease, background-color .25s ease; }
tr:last-child td { border-bottom-color: transparent; }

.hdr { position: relative; display: flex; align-items: center; justify-content: center; font-size: 21px; font-weight: 700; padding: 10px 0; }
.theme-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--accent); color: var(--accent-text); border: none; border-radius: 20px; padding: 6px 14px; font-weight: 600; cursor: pointer; }
.theme-toggle:hover { transform: translateY(-50%) scale(1.05); }

.spacer-row td { height: 12px; background: var(--bg-2); border: none; padding: 0; }

.th-weekend { color: var(--sat-red); }

.col-ter-1 { width: var(--w-ter-1); }
.col-ter-2 { width: var(--w-ter-2); }
.col-myk   { width: var(--w-myk); }
.col-min   { width: var(--w-min); }
.col-kas   { width: var(--w-kas); }

@media (orientation: landscape) {
  .cell-box { margin-left: 50%; transform: translateX(-50%); padding-left: 6px; }
}
@media (orientation: portrait) {
  .cell-box { margin-left: 0; transform: none; padding-left: 2px; }
}
@media (max-width: 380px) {
  body { font-size: 14px; }
  th { font-size: 14px; padding: 8px 1px; }
  td { font-size: 14px; }
}
@media (min-width: 600px) {
  body { padding: 24px 32px; }
}

.col-ter-1 .cell-box, .col-ter-2 .cell-box, .col-kas .cell-box { padding-left: 6px; }
.col-myk .cell-box, .col-min .cell-box { padding-left: 14px; }

/* следующее отправление: подключается из schedule-live.css */

.marker { color: var(--label-3); font-weight: 700; letter-spacing: 0.3px; }
.time-black { color: var(--label-3); font-weight: 700; }
.weekend { color: var(--sat-red) !important; font-weight: 700; }
.text-black { color: var(--label-2) !important; font-weight: 700; }
.text-blue { color: var(--accent) !important; font-weight: 700; }
.text-red { color: var(--sat-red) !important; font-weight: 700; }
.text-green { color: #34c759 !important; font-weight: 700; }
.text-yellow { color: var(--warn) !important; font-weight: 700; }
.text-light { color: var(--label) !important; font-weight: 700; }

.note { padding: 4px 16px 16px; font-size: 15px; color: var(--label-2); line-height: 1.4; font-weight: 500; }
</style>
</head>
<body>
<div class="hdr">
  ПЕРЕЇЗД
  <button id="theme-toggle" class="theme-toggle">🌙</button>
</div>

<table id="grid"></table>
<div class="note"></div>

<script src="theme-toggle.js"></script>
<script src="pwa-install.js"></script>
<script>
/* ---------- тема ---------- */
ThemeToggle.init();
PWAInstall.init({ appName: 'Розклад' });

/* ---------- данные ---------- */
const raw = {
  tereshky_weekday: "05:45К, 07:00К, 07:20, 08:00, 08:20, 09:00К, 09:25, 10:15, 10:50, 11:25, 12:10, 12:45, 13:35, 14:00, 15:00, 15:40, 16:25, 17:00К, 17:35, 18:10, 18:40, 19:15",
  tereshky_sunday:  " ,07:00К, , , 08:20, 09:00К, , 10:15, , 11:25, , 12:45, , 14:00, 15:00, 15:40,, 17:00,, 18:10,, 19:15",
  myk: "05:50, 07:30, 09:10, 11:00, 15:10, 17:10, 19:30Ф",
  min: "06:50, 09:20, 11:40, 16:05, 18:20",
  kas: "06:10П, 06:45, 07:20, 08:15, 09:35, 12:15, 13:15, 14:00, 15:45, 16:35, 17:40",

  note: "К – через Круг (McDonald's)<br>П – через Півд.Вокзал.<br>Ф – до Фурманова.<br>Графік №2 (Кашубівка): Нд, Сб. – ВІДСУТНІЙ."
};

// Настройка подсветки: "фраза": "css-класс"
const colorMap = {
  "Графік №2": "text-red",
  "Нд, Сб": "weekend",
  "ВІДСУТНІЙ": "text-light",
  "Півд.Вокзал": "marker",
  "Фурманова": "text-light",
  "Круг": "marker"
};

// Времена для отдельной подсветки (.time-black) — сейчас не используется,
// 19:30 теперь обозначается маркером "Ф" прямо в расписании
const blackTimes = [];

function highlightAllMarkers(text){ return TextHighlight.highlightAllMarkers(text); }
function highlightTimeBlack(text){ return TextHighlight.highlightTimeBlack(text, blackTimes); }
function colorText(text){ return TextHighlight.colorText(text, colorMap); }

/* ---------- заполнение таблицы ---------- */
function fillTable(){
  const t = document.getElementById('grid');
  t.innerHTML = `
    <tr>
      <th>Терешки</th>
      <th class="th-weekend">Терешки</th>
      <th>Мик.</th>
      <th>Мин.</th>
      <th>Кашуб.</th>
    </tr>`;

  /* ---------- пустая строка ---------- */
  const spacer = document.createElement('tr');
  spacer.className = 'spacer-row';
  for(let k = 0; k < 5; k++){
    spacer.appendChild(document.createElement('td'));
  }
  t.appendChild(spacer);

  const cols = [
    raw.tereshky_weekday.split(',').map(s => s.trim()),
    raw.tereshky_sunday.split(',').map(s => s.trim()),
    raw.myk.split(',').map(s => s.trim()),
    raw.min.split(',').map(s => s.trim()),
    raw.kas.split(',').map((s, idx) => ({ text: s.trim(), grafik: idx % 2 + 1 }))
  ];
  const maxRows = Math.max(...cols.map(c => c.length));

  function extractTime(s){ const m = (s||'').match(/\d{1,2}:\d{2}/); return m ? m[0] : ''; }

  /* для Кашуб график №2 отсутствует в Сб И Нд (не только в Нд, как у Терешок) */
  const todayDay = new Date().getDay(); // 0 = Нд, 6 = Сб
  const isKasWeekendToday = todayDay === 0 || todayDay === 6;

  for(let i = 0; i < maxRows; i++){
    const tr = document.createElement('tr');

    /* Терешки будні */
    const tTer1 = extractTime(cols[0][i]);
    const tdTer1 = tr.insertCell();
    tdTer1.className = 'col-ter-1';
    if(tTer1){ tdTer1.dataset.time = tTer1; tdTer1.dataset.weekend = '0'; tdTer1.dataset.group = 'col-ter-1'; }
    tdTer1.innerHTML = `<div class="cell-box">${highlightTimeBlack(colorText(highlightAllMarkers(cols[0][i] || '')))}</div>`;

    /* Терешки нд */
    const tTer2 = extractTime(cols[1][i]);
    const tdTer2 = tr.insertCell();
    tdTer2.className = 'col-ter-2';
    if(tTer2){ tdTer2.dataset.time = tTer2; tdTer2.dataset.weekend = '1'; tdTer2.dataset.group = 'col-ter-2'; }
    tdTer2.innerHTML = `<div class="cell-box">${highlightTimeBlack(colorText(highlightAllMarkers(cols[1][i] || '')))}</div>`;

    /* Мик. (рейс ежедневный — нет отдельного расписания на выходные) */
    const tMyk = extractTime(cols[2][i]);
    const tdMyk = tr.insertCell();
    tdMyk.className = 'col-myk';
    if(tMyk){ tdMyk.dataset.time = tMyk; tdMyk.dataset.always = '1'; tdMyk.dataset.group = 'col-myk'; }
    tdMyk.innerHTML = `<div class="cell-box">${highlightTimeBlack(colorText(highlightAllMarkers(cols[2][i] || '')))}</div>`;

    /* Мин. (рейс ежедневный — нет отдельного расписания на выходные) */
    const tMin = extractTime(cols[3][i]);
    const tdMin = tr.insertCell();
    tdMin.className = 'col-min';
    if(tMin){ tdMin.dataset.time = tMin; tdMin.dataset.always = '1'; tdMin.dataset.group = 'col-min'; }
    tdMin.innerHTML = `<div class="cell-box">${highlightTimeBlack(colorText(highlightAllMarkers(cols[3][i] || '')))}</div>`;

    /* Кашуб. (grafik: 1 = щодня, 2 = тільки будні Пн–Пт, відсутній Сб/Нд) */
    const kas = cols[4][i];
    const tdKas = tr.insertCell();
    tdKas.className = 'col-kas';
    if(kas && kas.text){
      const tKas = extractTime(kas.text);
      let txt = highlightTimeBlack(colorText(highlightAllMarkers(kas.text)));
      if(kas.grafik === 2) txt = `<span class="weekend">${txt}</span>`;
      if(tKas){
        if(kas.grafik === 1){
          /* график 1 — каждый день, без исключений */
          tdKas.dataset.time = tKas;
          tdKas.dataset.always = '1';
          tdKas.dataset.group = 'col-kas';
        } else if(!isKasWeekendToday){
          /* график 2 — активен только в будни (Пн–Пт), на Сб/Нд не участвует
             в подсветке "ближайшего рейса", т.к. реально не выполняется */
          tdKas.dataset.time = tKas;
          tdKas.dataset.weekend = '0';
          tdKas.dataset.group = 'col-kas';
        }
      }
      tdKas.innerHTML = `<div class="cell-box">${txt}</div>`;
    } else {
      tdKas.innerHTML = '<div class="cell-box"></div>';
    }

    t.appendChild(tr);
  }

  /* ---------- нижняя пустая строка ---------- */
  const spacerBottom = document.createElement('tr');
  spacerBottom.className = 'spacer-row';
  for(let k = 0; k < 5; k++){
    spacerBottom.appendChild(document.createElement('td'));
  }
  t.appendChild(spacerBottom);

  document.querySelector('.note').innerHTML = highlightTimeBlack(colorText(highlightAllMarkers(raw.note)));
}
</script>

<script src="text-highlight.js"></script>
<script src="schedule-live.js"></script>
<script>
fillTable();
ScheduleLive.start();
</script>
</body>
</html>
