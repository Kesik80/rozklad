<style>
/* ---------- iOS LIGHT ---------- */
:root {
  --bg-0: #f2f2f7;             /* фон страницы */
  --bg-1: #ffffff;             /* карточки */
  --bg-2: #fafafa;             /* нажатое состояние */
  --label: #000000;            /* основной текст */
  --label-2: #6c6c70;          /* вторичный */
  --label-3: #3a3a3c;
  --separator: #c6c6c8;        /* тонкие линии */
  --accent: #007aff;           /* синий акцент */
  --accent-text: #ffffff;
  --font: -apple-system, Roboto, "Segoe UI", Helvetica, Arial, sans-serif;
}

/* ---------- iOS DARK + Pure Black ---------- */
[data-theme="dark"] {
  --bg-0: #000000;             /* OLED чёрный */
  --bg-1: #1c1c1e;             /* карточки */
  --bg-2: #252528;             /* нажатое состояние */
  --label: #ffffff;
  --label-2: #a2a2a7;
  --label-3: #e5e5ea;
  --separator: #6c6c70;
  --accent: #0a84ff;
  --accent-text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); transition: background-color .25s ease, color .25s ease; }
html { background: var(--bg-0); }
body { background: var(--bg-0); color: var(--label); font-size: 16px; font-weight: 600; padding: 10px 12px; max-width: 640px; margin: 0 auto; }

.hdr { position: relative; display: flex; align-items: center; justify-content: center; font-size: 21px; font-weight: 700; padding: 10px 0; }
.theme-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--accent); color: var(--accent-text); border: none; border-radius: 20px; padding: 6px 14px; font-weight: 600; cursor: pointer; }
.theme-toggle:hover { transform: translateY(-50%) scale(1.05); }

.menu { width: 60%; margin: 14px auto 24px; background: var(--bg-1); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.12); }
.row {
  display: flex; align-items: center; justify-content: center;
  padding: 15px 16px; font-size: 17px; font-weight: 600; color: var(--label);
  text-decoration: none; border-bottom: 1px solid var(--separator);
}
.row:last-child { border-bottom: none; }
.row:active { background: var(--bg-2); }
.label { display: inline-block; text-align: left; }
</style>
</head>
<body>
<div class="hdr">
  Расписюлька
  <button id="theme-toggle" class="theme-toggle">🌙</button>
</div>

<div class="menu">

  <a class="row" href="page.html?v=Вовківка"><span class="label">Вовківка</span></a>

  <a class="row" href="page.html?v=Головач"><span class="label">Головач</span></a>
  <a class="row" href="page.html?v=Електрички"><span class="label">Електрички</span></a>
  <a class="row" href="info.html"><span class="label">info</span></a>
</div>

<script src="theme-toggle.js"></script>
<script src="equalize-width.js"></script>
<script src="pwa-install.js"></script>
<script>
ThemeToggle.init();
EqualizeWidth.apply('.menu .label');
PWAInstall.init({ appName: 'Розклад' });
</script>
</body>
