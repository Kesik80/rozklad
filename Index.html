<!-- Окрашивает строку статуса/адресную строку — подстраивается под тему в theme-toggle.js -->

<!-- Манифест и иконки (распакуй сюда содержимое icons/ из Icon Forge) -->

<!-- Open Graph / превью при шаринге ссылки -->

<style>
/* ---------- iOS LIGHT ---------- */
:root {
  --bg-0: #f2f2f7;             /* фон страницы */
  --bg-1: #ffffff;             /* карточки */
  --bg-2: #fafafa;             /* нажатое состояние */
  --label: #000000;            /* основной текст */
  --label-2: #6c6c70;          /* вторичный */
  --label-3: #3a3a3c;
  --separator: #c6c6c8;        /* тонкие линии */
  --accent: #007aff;           /* синий акцент */
  --accent-text: #ffffff;
  --font: -apple-system, Roboto, "Segoe UI", Helvetica, Arial, sans-serif;
}

/* ---------- iOS DARK + Pure Black ---------- */
[data-theme="dark"] {
  --bg-0: #000000;             /* OLED чёрный */
  --bg-1: #1c1c1e;             /* карточки */
  --bg-2: #252528;             /* нажатое состояние */
  --label: #ffffff;
  --label-2: #a2a2a7;
  --label-3: #e5e5ea;
  --separator: #6c6c70;
  --accent: #0a84ff;
  --accent-text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); transition: background-color .25s ease, color .25s ease; }
html { background: var(--bg-0); }
body { background: var(--bg-0); color: var(--label); font-size: 16px; font-weight: 600; padding: 10px 12px; max-width: 640px; margin: 0 auto; }

.hdr { position: relative; display: flex; align-items: center; justify-content: center; font-size: 21px; font-weight: 700; padding: 10px 0; }
.theme-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--accent); color: var(--accent-text); border: none; border-radius: 20px; padding: 6px 14px; font-weight: 600; cursor: pointer; }
.theme-toggle:hover { transform: translateY(-50%) scale(1.05); }

.menu { width: 60%; margin: 14px auto 24px; background: var(--bg-1); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.12); }
.row {
  display: flex; align-items: center; justify-content: center;
  padding: 15px 16px; font-size: 17px; font-weight: 600; color: var(--label);
  text-decoration: none; border-bottom: 1px solid var(--separator);
}
.row:last-child { border-bottom: none; }
.row:active { background: var(--bg-2); }
.label { display: inline-block; text-align: left; }

#app-splash { position: fixed; inset: 0; z-index: 99999; overflow: hidden; }

.curtain {
  position: absolute; top: 0; bottom: 0; width: 50%;
  background: var(--bg-1);
  transform: translateY(-100%);
}
.curtain-left { left: 0; }
.curtain-right { right: 0; }
.curtain.run { animation: curtainDown .5s cubic-bezier(.65,0,.35,1) forwards; }
.curtain-left.part { animation: curtainLeftOut .55s cubic-bezier(.65,0,.35,1) forwards; }
.curtain-right.part { animation: curtainRightOut .55s cubic-bezier(.65,0,.35,1) forwards; }

@keyframes curtainDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
@keyframes curtainLeftOut { from { transform: translateY(0) translateX(0); } to { transform: translateY(0) translateX(-100%); } }
@keyframes curtainRightOut { from { transform: translateY(0) translateX(0); } to { transform: translateY(0) translateX(100%); } }

.splash-content {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  opacity: 0; transition: opacity .3s ease;
}
.splash-content.show { opacity: 1; }
.splash-content .splash-icon { width: 84px; height: 84px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
.splash-content .splash-title { font-size: 19px; font-weight: 700; color: var(--label); letter-spacing: .3px; }
</style>
</head>
<body>
<div id="app-splash">
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <div class="splash-content">
    <img src="/icons/icon-192x192.png" class="splash-icon" alt="">
    <div class="splash-title">Розклад</div>
  </div>
</div>
<script>
// Проверяем СРАЗУ, ещё до отрисовки остальной страницы: показываем заставку
// только если приложение запущено в standalone-режиме (с экрана "Домой").
// При обычном открытии в браузере — сразу убираем, без анимации и "мигания".
(function () {
  window.__isStandaloneApp = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  var el = document.getElementById('app-splash');
  if (window.__isStandaloneApp) {
    el.querySelector('.curtain-left').classList.add('run');
    el.querySelector('.curtain-right').classList.add('run');
  } else if (el) {
    el.remove();
  }
})();
</script>
<div class="hdr">
  Расписюлька
  <button id="theme-toggle" class="theme-toggle">🌙</button>
</div>

<div class="menu">
  <a class="row" href="pereizd.html?v=Переїзд"><span class="label">Переїзд</span></a>
  <a class="row" href="tereschky.html?v=Терешки"><span class="label">Терешки</span></a>
  <a class="row" href="page.html?v=Микільске"><span class="label">Микільске</span></a>
  <a class="row" href="page.html?v=Минівка"><span class="label">Минівка</span></a>
  <a class="row" href="page.html?v=Кашубівка"><span class="label">Кашубівка</span></a>
  <a class="row" href="page.html?v=Вовківка"><span class="label">Вовківка</span></a>
  <a class="row" href="page.html?v=Верхоли"><span class="label">Верхоли</span></a>
  <a class="row" href="page.html?v=Головач"><span class="label">Головач</span></a>
  <a class="row" href="page.html?v=Електрички"><span class="label">Електрички</span></a>
  <a class="row" href="info.html"><span class="label">info</span></a>
</div>

<script src="theme-toggle.js"></script>
<script src="equalize-width.js"></script>
<script src="pwa-install.js"></script>
<script src="splash-screen.js"></script>
<script>
if (window.__isStandaloneApp) SplashScreen.init();
ThemeToggle.init();
EqualizeWidth.apply('.menu .label');
PWAInstall.init({ appName: 'Розклад' });
</script>
</body>
</html>
