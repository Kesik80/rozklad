<style>
/* ---------- iOS LIGHT ---------- */
:root {
  --bg-0: #f2f2f7;
  --bg-1: #ffffff;
  --bg-2: #fafafa;
  --label: #000000;
  --label-2: #6c6c70;
  --label-3: #3a3a3c;
  --separator: #c6c6c8;
  --accent: #007aff;
  --accent-text: #ffffff;
  --th-color: #c2670a;
  --hint-color: #8e8e93;
  --sat-red: #ff3b30;
  --warn: #ff9500;
  --font: -apple-system, Roboto, "Segoe UI", Helvetica, Arial, sans-serif;
}

/* ---------- iOS DARK ---------- */
[data-theme="dark"] {
  --bg-0: #000000;
  --bg-1: #1c1c1e;
  --bg-2: #252528;
  --label: #ffffff;
  --label-2: #a2a2a7;
  --label-3: #e5e5ea;
  --separator: #6c6c70;
  --accent: #0a84ff;
  --accent-text: #ffffff;
  --th-color: #ff9500;
  --hint-color: #d0d0d5;
  --sat-red: #ff5e57;
  --warn: #ff9f0a;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); transition: background-color .25s ease, color .25s ease; }
html { background: var(--bg-0); }
body { background: var(--bg-0); color: var(--label); font-size: 16px; font-weight: 600; padding: 10px 8px; max-width: 640px; margin: 0 auto; }

.hdr { display: flex; align-items: center; justify-content: center; font-size: 21px; font-weight: 700; padding: 10px 0; }
.theme-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--accent); color: var(--accent-text); border: none; border-radius: 20px; padding: 6px 14px; font-weight: 600; cursor: pointer; }

/* Заголовок маршруту всередині таблиці */
.section { margin-bottom: 12px; }

table {
  width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 0;
  background: var(--bg-1); border-radius: 12px; overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.12);
}
.tbl-title {
  text-align: center; font-size: 16px; font-weight: 700;
  color: var(--label); padding: 9px 8px;
  border-bottom: 1px solid var(--separator);
  letter-spacing: .2px; white-space: nowrap; overflow: hidden;
}
.tbl-title .from { color: var(--th-color); }
td {
  background: var(--bg-2); padding: 1.5px 2px;
  font-size: 15px; color: var(--label-2); text-align: center;
  white-space: nowrap; font-weight: 600; overflow: hidden;
  border: 3px solid transparent;
  transition: border-color 1s ease, color 1s ease, background-color .25s ease;
}
td.col-loc { text-align: left; padding-left: 8px; color: var(--label); font-weight: 600; }
td.col-loc.key-stop { color: var(--th-color); }
tr:last-child td { border-bottom-color: transparent; }

.note { padding: 8px 4px 16px; font-size: 13px; color: var(--label-2); line-height: 1.5; font-weight: 500; }
.note a { color: var(--accent); }
.note .warn-text { color: var(--sat-red); font-weight: 700; }

@media (max-width: 380px) {
  body { font-size: 12px; padding: 8px 4px; }
  td { font-size: 13px; padding: 4px 1px; }
  .tbl-title { font-size: 14px; }
}
@media (min-width: 600px) {
  body { padding: 24px 32px; }
}
</style>

/* ===================== РЕНДЕР ===================== */
function buildTable(route) {
  const numCols = route.cols.length - 1; // кількість колонок з часом
  // колонка станції = 12 символів, решта ділиться рівно
  const locW = '11ch';
  const timeW = `calc((100% - 11ch) / ${numCols})`;

  let html = `
  <div class="section">
    <table>
      <colgroup>
        <col style="width:${locW}">
        ${Array(numCols).fill(`<col style="width:${timeW}">`).join('')}
      </colgroup>
      <tr>
        <th class="tbl-title" colspan="${route.cols.length}">
          <span class="from">${route.from}</span> — ${route.to}
        </th>
      </tr>`;

  route.rows.forEach(row => {
    html += `<tr>`;
    html += `<td class="col-loc${row.key ? ' key-stop' : ''}">${row.loc}</td>`;
    row.times.forEach(t => {
      const isTime = /\d{2}:\d{2}/.test(t);
      const attrs = isTime
        ? ` data-time="${t}" data-always="1" data-group="${route.group}"`
        : '';
      html += `<td${attrs}>${t}</td>`;
    });
    html += `</tr>`;
  });

  html += `</table></div>`;
  return html;
}

const app = document.getElementById('app');
app.innerHTML = ROUTES.map(buildTable).join('') + `

</div>`;
