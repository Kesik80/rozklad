<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>Парсер розкладу</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
:root {
  --bg-0: #000000; --bg-1: #1c1c1e; --bg-2: #2c2c2e;
  --label: #ffffff; --label-2: #a2a2a7;
  --accent: #0a84ff; --green: #30d158; --warn: #ff9f0a; --red: #ff453a;
  --separator: #3a3a3c;
  --font: -apple-system, Roboto, "Segoe UI", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:var(--font); }
html,body { background:var(--bg-0); color:var(--label); min-height:100vh; }
body { padding:12px; max-width:720px; margin:0 auto; }

h1 { font-size:20px; font-weight:700; text-align:center; padding:12px 0 4px; }
.sub { font-size:13px; color:var(--label-2); text-align:center; margin-bottom:16px; }

.card { background:var(--bg-1); border-radius:12px; padding:14px; margin-bottom:12px; }
.card-title { font-size:13px; font-weight:700; color:var(--label-2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }

label { display:block; font-size:14px; color:var(--label-2); margin-bottom:4px; margin-top:10px; }
label:first-of-type { margin-top:0; }
input, textarea, select {
  width:100%; background:var(--bg-2); border:1px solid var(--separator);
  border-radius:8px; padding:8px 10px; font-size:14px; color:var(--label); outline:none;
}
input:focus, textarea:focus { border-color:var(--accent); }
textarea { height:72px; resize:vertical; font-size:13px; }
select option { background:var(--bg-1); }

.stations-list { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
.station-row { display:flex; gap:6px; align-items:center; }
.station-row input { flex:1; }
.btn-icon { background:var(--bg-2); border:1px solid var(--separator); border-radius:6px; padding:6px 10px; color:var(--label-2); cursor:pointer; font-size:16px; flex-shrink:0; }
.btn-icon:hover { background:var(--separator); }

.btn { display:block; width:100%; padding:12px; border-radius:10px; border:none; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:disabled { opacity:.4; cursor:default; }

.status { font-size:13px; padding:8px 10px; border-radius:8px; margin-top:8px; display:none; }
.status.info  { background:rgba(10,132,255,.15); color:var(--accent); display:block; }
.status.ok    { background:rgba(48,209,88,.15);  color:var(--green);  display:block; }
.status.error { background:rgba(255,69,58,.15);  color:var(--red);    display:block; }

.progress-bar { height:4px; background:var(--bg-2); border-radius:2px; margin-top:8px; overflow:hidden; display:none; }
.progress-bar.show { display:block; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }

.result-block { margin-top:12px; }
.result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.result-title { font-size:14px; font-weight:700; color:var(--warn); }
.copy-btn { background:var(--bg-2); border:1px solid var(--separator); border-radius:6px; padding:5px 12px; font-size:13px; color:var(--accent); cursor:pointer; }

.trains-grid { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--bg-2); color:var(--warn); padding:6px 5px; text-align:center; border-bottom:1px solid var(--separator); white-space:nowrap; }
th.s { text-align:left; }
td { padding:4px 5px; text-align:center; color:var(--label-2); border-bottom:1px solid var(--separator); white-space:nowrap; }
td.s { text-align:left; color:var(--label); font-weight:600; }
td.miss { color:var(--separator); }
tr:last-child td { border-bottom:none; }

pre { background:var(--bg-2); border-radius:8px; padding:10px; font-size:11px; color:var(--green);
  overflow-x:auto; white-space:pre-wrap; word-break:break-all; max-height:220px; overflow-y:auto; margin-top:8px; }

.direction-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; margin-left:6px; }
.dir-odd  { background:rgba(10,132,255,.2); color:var(--accent); }
.dir-even { background:rgba(48,209,88,.2);  color:var(--green); }
</style>
</head>
<body>

<h1>🚂 Парсер розкладу</h1>
<p class="sub">swrailway.gov.ua → elektrychky.html</p>

<div class="card">
  <div class="card-title">Налаштування</div>

  <label>Станція пошуку (визначає напрямки)</label>
  <select id="searchStation" onchange="onSearchStationChange()">
    <option value="tereschky">Терешки (непарні ← з Полтави, парні → на Полтаву)</option>
    <option value="kopily">Копили (парні ← з Полтави, непарні → на Полтаву)</option>
  </select>

  <label>TID поїздів (через кому або новий рядок)</label>
  <div style="display:flex;gap:8px;margin-bottom:4px">
    <button class="btn-icon" style="flex:1;font-size:13px" onclick="autoLoadTids()">🔄 Завантажити автоматично</button>
  </div>
  <textarea id="tids" placeholder="28320, 28379, 28343..."></textarea>
  <div id="tidsStatus" style="font-size:12px;color:var(--label-2);margin-top:4px;display:none"></div>

  <label>Станції маршруту (в потрібному порядку)</label>
  <div class="stations-list" id="stationsList"></div>
  <button class="btn-icon" style="margin-top:8px;width:100%" onclick="addStation()">+ Додати станцію</button>
</div>

<button class="btn btn-primary" id="parseBtn" onclick="startParsing()">🔍 Завантажити розклад</button>
<div class="status" id="status"></div>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div id="output"></div>

<script>
/* ========== PRESETS ========== */
const PRESETS = {
  tereschky: {
    sid: '2803',
    stations: ['Головач','Безручки','Клюшники','Зінці','Терешки','Полтава'],
    oddDir:  { from:'ПОЛТАВА ПІВДЕННА', to:'ТЕРЕШКИ', key:'Терешки', group:'g_polt_ter' },
    evenDir: { from:'ТЕРЕШКИ', to:'ПОЛТАВА ПІВДЕННА', key:'Терешки', group:'g_ter_polt' },
  },
  kopily: {
    sid: '2637',
    stations: ['Минівка','Портнівка','Кашубівка','Микільське','Копили','3-й км','Полтава'],
    oddDir:  { from:'КОПИЛИ', to:'ПОЛТАВА ПІВДЕННА', key:'Копили', group:'g_kop_polt' },
    evenDir: { from:'ПОЛТАВА ПІВДЕННА', to:'КОПИЛИ', key:'Копили', group:'g_polt_kop' },
  }
};

function onSearchStationChange() {
  const key = document.getElementById('searchStation').value;
  const preset = PRESETS[key];
  const list = document.getElementById('stationsList');
  list.innerHTML = '';
  preset.stations.forEach(s => addStation(s));
  // Скидаємо TID при зміні станції
  document.getElementById('tids').value = '';
  document.getElementById('tidsStatus').style.display = 'none';
}

async function autoLoadTids() {
  const key = document.getElementById('searchStation').value;
  const preset = PRESETS[key];
  const statusEl = document.getElementById('tidsStatus');
  statusEl.style.display = 'block';
  statusEl.style.color = 'var(--accent)';
  statusEl.textContent = '⏳ Завантажую список поїздів...';

  try {
    const res = await fetch(`/api/fetch-station?sid=${preset.sid}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (!data.trains || !data.trains.length) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = '❌ Поїзди не знайдені';
      return;
    }

    const tids = data.trains.map(t => t.tid).join(', ');
    document.getElementById('tids').value = tids;
    statusEl.style.color = 'var(--green)';
    statusEl.textContent = `✅ Знайдено ${data.trains.length} поїздів: ${data.trains.map(t => t.trainNum).join(', ')}`;
  } catch(e) {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = `❌ Помилка: ${e.message}`;
  }
}

function addStation(val='') {
  const list = document.getElementById('stationsList');
  const div = document.createElement('div');
  div.className = 'station-row';
  div.innerHTML = `<input type="text" value="${val}" placeholder="Назва станції">
    <button class="btn-icon" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(div);
}

function getStations() {
  return [...document.querySelectorAll('#stationsList input')]
    .map(i => i.value.trim()).filter(Boolean);
}

function getTids() {
  return document.getElementById('tids').value
    .split(/[\s,\n]+/).map(s => s.trim()).filter(s => /^\d+$/.test(s));
}

// Ініціалізуємо станції при завантаженні
onSearchStationChange();

/* ========== МАППІНГ СТАНЦІЙ ========== */
// search: що шукаємо на сайті, display: що показуємо, useArr: брати час прибуття
const STATION_MAP = [
  { display: 'Клюшники', search: 'Клюшинки',        useArr: false },
  { display: '3-й км',   search: '3 км',             useArr: false },
  { display: 'Полтава',  search: 'Полтава-Південна', useArr: 'byDir' }, // залежить від напрямку
];

function getStationSearch(displayName) {
  const m = STATION_MAP.find(s => s.display === displayName);
  return m ? m.search : displayName;
}

function getStationUseArr(displayName, poltavaIsDestination) {
  const m = STATION_MAP.find(s => s.display === displayName);
  if (!m) return false;
  if (m.useArr === 'byDir') return poltavaIsDestination;
  return m.useArr;
}

/* ========== MATCHING ========== */
function normalizeStation(name) {
  return name
    .replace(/^з[\./]п[\.]?\s*/i, '')
    .replace(/^зп\s+/i, '')
    .trim().toLowerCase();
}

function matchStation(rawName, wanted) {
  const clean = normalizeStation(rawName);
  const w = wanted.toLowerCase();
  // Точне входження
  if (clean === w) return true;
  if (clean.includes(w) || w.includes(clean)) return true;
  // Порівняння без дефісів і пробілів
  const cleanND = clean.replace(/[\s\-]/g, '');
  const wND = w.replace(/[\s\-]/g, '');
  if (cleanND === wND) return true;
  // По перших 5 символах (для опечаток типу Клюшники/Клюшинки)
  if (clean.length >= 4 && w.length >= 4 && clean.slice(0,5) === w.slice(0,5)) return true;
  return false;
}

function findTime(stations, wanted, useArr = false) {
  for (const s of stations) {
    if (matchStation(s.name, wanted)) {
      if (useArr) return s.arr || s.dep || '-';
      return s.dep || s.arr || '-';
    }
  }
  return '-';
}

/* ========== ПУЛ ПАРАЛЕЛЬНИХ ЗАПИТІВ (з обмеженням, бо ScrapingBee free має ліміт ~5) ========== */
async function runWithConcurrency(items, limit, worker) {
  let i = 0;
  async function next() {
    if (i >= items.length) return;
    const item = items[i++];
    await worker(item);
    await next();
  }
  await Promise.all(Array(Math.min(limit, items.length)).fill(0).map(() => next()));
}

/* ========== FETCH ========== */
async function fetchTrain(tid, attempt = 0) {
  try {
    const res = await fetch(`/api/fetch-timetable?tid=${tid}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    if (attempt < 2) {
      await new Promise(r => setTimeout(r, 1000));
      return fetchTrain(tid, attempt + 1);
    }
    throw e;
  }
}

/* ========== MAIN ========== */
function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}
function setProgress(pct) {
  document.getElementById('progressBar').classList.toggle('show', pct > 0 && pct < 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

let resultsMap = new Map();   // tid -> {tid, trainNum, times, parity}
let failedTids = [];
let currentStations = [];
let currentSearchKey = '';

function computeResult(data, stations, searchKey) {
  const trainNum = parseInt(data.trainNum) || 0;
  const isOdd = trainNum % 2 === 1;
  const isT = searchKey === 'tereschky';
  // Полтава кінцева (useArr=true) коли поїзд іде НА Полтаву:
  // Терешки: парні → на Полтаву; Копили: непарні → на Полтаву
  const poltavaIsDestination = isT ? !isOdd : isOdd;
  const times = {};
  stations.forEach(st => {
    const searchName = getStationSearch(st);
    const useArr = getStationUseArr(st, poltavaIsDestination);
    times[st] = findTime(data.stations, searchName, useArr);
  });
  return { trainNum: data.trainNum, times, parity: trainNum % 2 };
}

async function runBatch(tids, stations, searchKey) {
  failedTids = [];
  let done = 0;
  await runWithConcurrency(tids, 4, async (tid) => {
    try {
      const data = await fetchTrain(tid);
      resultsMap.set(tid, { tid, ...computeResult(data, stations, searchKey) });
    } catch(e) {
      console.warn(`tid=${tid}:`, e.message);
      failedTids.push(tid);
    }
    done++;
    setProgress(Math.round(done / tids.length * 90) + 5);
  });
}

function renderRetryButton() {
  let btn = document.getElementById('retryBtn');
  if (!failedTids.length) { if (btn) btn.remove(); return; }
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'retryBtn';
    btn.className = 'btn btn-primary';
    document.getElementById('parseBtn').insertAdjacentElement('afterend', btn);
  }
  btn.disabled = false;
  btn.textContent = `🔁 Повторити невдалі (${failedTids.length})`;
  btn.onclick = retryFailed;
}

async function retryFailed() {
  const toRetry = [...failedTids];
  const btn = document.getElementById('retryBtn');
  if (btn) btn.disabled = true;
  document.getElementById('parseBtn').disabled = true;
  setStatus(`Повторне завантаження ${toRetry.length} поїздів...`, 'info');
  setProgress(5);

  await runBatch(toRetry, currentStations, currentSearchKey);

  setProgress(0);
  renderAll();
  renderRetryButton();
  document.getElementById('parseBtn').disabled = false;
}

function renderAll() {
  const outputEl = document.getElementById('output');
  outputEl.innerHTML = '';

  const preset = PRESETS[currentSearchKey];
  const isT = currentSearchKey === 'tereschky';
  const all = [...resultsMap.values()];
  const odd  = all.filter(r => r.parity === 1);
  const even = all.filter(r => r.parity === 0);

  // Терешки: непарні = ПОЛТАВА→ТЕРЕШКИ (oddDir), парні = ТЕРЕШКИ→ПОЛТАВА (evenDir)
  // Копили:  парні  = КОПИЛИ→ПОЛТАВА  (oddDir), непарні = ПОЛТАВА→КОПИЛИ (evenDir)
  const dirA = { trains: isT ? odd  : even, meta: preset.oddDir,  badge: isT ? 'odd' : 'even' };
  const dirB = { trains: isT ? even : odd,  meta: preset.evenDir, badge: isT ? 'even' : 'odd'  };

  const sortByTime = arr => arr.sort((a,b) => {
    const ta = Object.values(a.times).find(t => t !== '-') || '99:99';
    const tb = Object.values(b.times).find(t => t !== '-') || '99:99';
    return ta.localeCompare(tb);
  });
  sortByTime(dirA.trains);
  sortByTime(dirB.trains);

  if (dirA.trains.length) renderBlock(outputEl, dirA.trains, currentStations, dirA.meta, dirA.badge);
  if (dirB.trains.length) renderBlock(outputEl, dirB.trains, currentStations, dirB.meta, dirB.badge);

  const total = all.length;
  if (!total) {
    setStatus('Нічого не вдалось завантажити', 'error');
  } else if (failedTids.length) {
    setStatus(`✅ Завантажено ${total} поїздів, не вдалось ${failedTids.length} — натисніть "Повторити невдалі"`, 'error');
  } else {
    setStatus(`✅ Готово! ${total} поїздів у двох напрямках.`, 'ok');
  }
}

async function startParsing() {
  const tids = getTids();
  const stations = getStations();
  const searchKey = document.getElementById('searchStation').value;

  if (!tids.length) { setStatus('Введіть TID поїздів', 'error'); return; }
  if (!stations.length) { setStatus('Додайте станції', 'error'); return; }

  resultsMap = new Map();
  failedTids = [];
  currentStations = stations;
  currentSearchKey = searchKey;

  document.getElementById('parseBtn').disabled = true;
  document.getElementById('output').innerHTML = '';
  const oldRetryBtn = document.getElementById('retryBtn');
  if (oldRetryBtn) oldRetryBtn.remove();

  setStatus(`Завантажую ${tids.length} поїздів (паралельно, по 4)...`, 'info');
  setProgress(5);

  await runBatch(tids, stations, searchKey);

  setProgress(0);
  renderAll();
  renderRetryButton();
  document.getElementById('parseBtn').disabled = false;
}

/* ========== RENDER ========== */
function renderBlock(container, results, stations, dir, parity) {
  const card = document.createElement('div');
  card.className = 'card result-block';

  // Заголовок
  const hdr = document.createElement('div');
  hdr.className = 'result-header';
  const badge = parity === 'odd'
    ? `<span class="direction-badge dir-odd">непарні</span>`
    : `<span class="direction-badge dir-even">парні</span>`;
  hdr.innerHTML = `
    <div class="result-title">${dir.from} — ${dir.to} ${badge}</div>
    <button class="copy-btn" onclick="copyJS(this)">Копіювати JS</button>`;
  card.appendChild(hdr);

  // Таблиця
  const grid = document.createElement('div');
  grid.className = 'trains-grid';
  let html = '<table><tr><th class="s">Станція</th>';
  results.forEach(r => { html += `<th>🚂${r.trainNum||'?'}</th>`; });
  html += '</tr>';
  stations.forEach(st => {
    html += `<tr><td class="s">${st}</td>`;
    results.forEach(r => {
      const t = r.times[st] || '-';
      html += `<td class="${t==='-'?'miss':''}">${t}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  grid.innerHTML = html;
  card.appendChild(grid);

  // JS
  const jsBlock = document.createElement('pre');
  jsBlock.textContent = buildJS(results, stations, dir);
  jsBlock.style.display = 'none';
  card.appendChild(jsBlock);

  // Зберігаємо для копіювання
  card.querySelector('.copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(jsBlock.textContent).then(() => {
      const btn = card.querySelector('.copy-btn');
      btn.textContent = '✓ Скопійовано';
      setTimeout(() => btn.textContent = 'Копіювати JS', 2000);
    });
  });

  container.appendChild(card);
}

function buildJS(results, stations, dir) {
  const rows = stations.map(st => {
    const times = results.map(r => `'${r.times[st]||'-'}'`).join(', ');
    const isKey = st.toLowerCase().includes(dir.key.toLowerCase());
    return `      { loc: '${st}', times: [${times}], key: ${isKey} },`;
  });
  return `  {
    id: '${dir.group}',
    from: '${dir.from}',
    to: '${dir.to}',
    keyStop: '${dir.key}',
    group: '${dir.group}',
    cols: ['Станція'${results.map((_,i)=>`, 'Рейс${i+1}'`).join('')}],
    rows: [
${rows.join('\n')}
    ]
  },`;
}
</script>
</body>
</html>
